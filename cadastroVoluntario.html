<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APE Voluntário - Gestão Integrada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#F1F5F9] text-[#1E293B] h-screen flex overflow-hidden">
    <div id="auth-container" class="fixed inset-0 z-[100] login-gradient flex items-center justify-center p-4 overflow-y-auto">
        <div class="w-full max-w-lg my-auto">
<div class="text-center mb-8">
                <div class="inline-flex bg-blue-600 p-3 rounded-2xl text-white mb-4 shadow-xl shadow-blue-900/20">
                    <i data-lucide="trending-up" size="32"></i>
                </div>
                <h1 class="text-3xl font-black text-white tracking-tighter italic">APE VOLUNTÁRIO</h1>
                <p class="text-slate-400 font-medium mt-2">Portal de Gestão Pedagógica</p>
            </div>

            <!-- Card de Cadastro -->
            <div id="signup-card" class="bg-white rounded-[2.5rem] p-8 shadow-2xl space-y-6  animate-fade-in">
                <div class="space-y-2">
                    <h2 class="text-xl font-black text-slate-900">Junte-se à Causa</h2>
                    <p class="text-slate-500 text-sm font-medium">Preencha os dados para iniciar a sua jornada.</p>
                </div>

                <form class="space-y-4" onsubmit="handleSignupReal(event)">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-1.5">
                            <label class="text-xs font-black text-slate-400 uppercase tracking-wider ml-1">Nome Completo</label>
                            <div class="relative">
                                <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" size="18"></i>
                                <input type="text" required placeholder="Thiago Silva" class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-3 pl-10 pr-4 text-sm focus:ring-4 focus:ring-blue-500/10 outline-none transition-all">
                            </div>
                        </div>

                        <div class="space-y-1.5">
                            <label class="text-xs font-black text-slate-400 uppercase tracking-wider ml-1">E-mail</label>
                            <div class="relative">
                                <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" size="18"></i>
                                <input type="email" required placeholder="seu@email.com" class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-3 pl-10 pr-4 text-sm focus:ring-4 focus:ring-blue-500/10 outline-none transition-all">
                            </div>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <label class="text-xs font-black text-slate-400 uppercase tracking-wider ml-1">Em qual disciplina você deseja lecionar?</label>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                            <div class="relative">
                                <input type="radio" name="discipline" id="math" value="matematica" class="discipline-card hidden" required>
                                <label for="math" class="flex flex-col items-center justify-center p-3 rounded-2xl border-2 border-slate-100 bg-slate-50 cursor-pointer hover:border-blue-200 transition-all">
                                    <i data-lucide="calculator" size="20" class="mb-1"></i>
                                    <span class="text-[10px] font-black uppercase">Matemática</span>
                                </label>
                            </div>
                            <div class="relative">
                                <input type="radio" name="discipline" id="port" value="portugues" class="discipline-card hidden">
                                <label for="port" class="flex flex-col items-center justify-center p-3 rounded-2xl border-2 border-slate-100 bg-slate-50 cursor-pointer hover:border-blue-200 transition-all">
                                    <i data-lucide="languages" size="20" class="mb-1"></i>
                                    <span class="text-[10px] font-black uppercase">Português</span>
                                </label>
                            </div>
                            <div class="relative">
                                <input type="radio" name="discipline" id="write" value="redacao" class="discipline-card hidden">
                                <label for="write" class="flex flex-col items-center justify-center p-3 rounded-2xl border-2 border-slate-100 bg-slate-50 cursor-pointer hover:border-blue-200 transition-all">
                                    <i data-lucide="pen-tool" size="20" class="mb-1"></i>
                                    <span class="text-[10px] font-black uppercase">Redação</span>
                                </label>
                            </div>
                            <div class="relative">
                                <input type="radio" name="discipline" id="eng" value="ingles" class="discipline-card hidden">
                                <label for="eng" class="flex flex-col items-center justify-center p-3 rounded-2xl border-2 border-slate-100 bg-slate-50 cursor-pointer hover:border-blue-200 transition-all">
                                    <i data-lucide="globe" size="20" class="mb-1"></i>
                                    <span class="text-[10px] font-black uppercase">Inglês</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1.5">
                            <label class="text-xs font-black text-slate-400 uppercase tracking-wider ml-1">Palavra-passe</label>
                            <input type="password" required placeholder="••••••••" class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-3 px-4 text-sm focus:ring-4 focus:ring-blue-500/10 outline-none transition-all">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-xs font-black text-slate-400 uppercase tracking-wider ml-1">Confirmar</label>
                            <input type="password" required placeholder="••••••••" class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-3 px-4 text-sm focus:ring-4 focus:ring-blue-500/10 outline-none transition-all">
                        </div>
                    </div>

                    <div class="flex items-start gap-2 px-1 pt-2">
                        <input type="checkbox" required id="terms" class="mt-1 w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                        <label for="terms" class="text-[10px] font-bold text-slate-500 leading-tight">Concordo com os Termos de Voluntariado e Política de Privacidade da APE.</label>
                    </div>

                    <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl font-black shadow-lg shadow-green-100 transition-all active:scale-[0.98]">
                        FINALIZAR REGISTO
                    </button>
                </form>

                <div class="pt-4 text-center border-t border-slate-50">
                    <p class="text-xs font-bold text-slate-400">Já tem conta? <a href="loginVoluntario.html" class="text-blue-600 hover:underline inline-block">Inicie sessão</a></p>
                </div>
            </div>
            
            <p class="text-center text-slate-500 text-[10px] mt-8 font-bold uppercase tracking-widest opacity-50">© 2024 APE - Apoio Pedagógico Estruturado</p>
        
        </div>
    </div>
    <script src="js/supabase.js"></script>
    <script src="js/voluntario-auth.js"></script>
</body>
</html>
