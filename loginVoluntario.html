<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APE Voluntário - Gestão Integrada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#F1F5F9] text-[#1E293B] h-screen flex overflow-hidden">
    <div id="auth-container" class="fixed inset-0 z-[100] login-gradient flex items-center justify-center p-4 overflow-y-auto">
        <div class="w-full max-w-lg my-auto">
<div class="text-center mb-8">
                <div class="inline-flex bg-blue-600 p-3 rounded-2xl text-white mb-4 shadow-xl shadow-blue-900/20">
                    <i data-lucide="trending-up" size="32"></i>
                </div>
                <h1 class="text-3xl font-black text-white tracking-tighter italic">APE VOLUNTÁRIO</h1>
                <p class="text-slate-400 font-medium mt-2">Portal de Gestão Pedagógica</p>
            </div>

            <!-- Card de Login -->
            <div id="login-card" class="bg-white rounded-[2.5rem] p-8 shadow-2xl space-y-6 animate-fade-in max-w-md mx-auto">
                <div class="space-y-2">
                    <h2 class="text-xl font-black text-slate-900">Bem-vindo de volta!</h2>
                    <p class="text-slate-500 text-sm font-medium">Insira as suas credenciais para aceder ao painel.</p>
                </div>

                <form class="space-y-4" onsubmit="handleLoginReal(event)">
                    <div class="space-y-1.5">
                        <label class="text-xs font-black text-slate-400 uppercase tracking-wider ml-1">E-mail Institucional</label>
                        <div class="relative">
                            <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" size="18"></i>
                            <input type="email" required placeholder="exemplo@ape.org" class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-3.5 pl-12 pr-4 text-sm focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all">
                        </div>
                    </div>

                    <div class="space-y-1.5">
                        <div class="flex justify-between items-center px-1">
                            <label class="text-xs font-black text-slate-400 uppercase tracking-wider">Palavra-passe</label>
                            <a href="#" class="text-[10px] font-bold text-blue-600 hover:underline">Esqueceu-se?</a>
                        </div>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" size="18"></i>
                            <input type="password" required placeholder="••••••••" class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-3.5 pl-12 pr-4 text-sm focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all">
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-200 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                        ENTRAR NO SISTEMA <i data-lucide="arrow-right" size="18"></i>
                    </button>
                </form>

                <div class="pt-4 text-center border-t border-slate-50">
                    <p class="text-xs font-bold text-slate-400">Novo por aqui? <a href="cadastroVoluntario.html" class="text-blue-600 hover:underline inline-block">Crie a sua conta de voluntário</a></p>
                </div>
            </div>

            
        </div>
    </div>
    <script src="js/supabase.js"></script>
    <script src="js/voluntario-auth.js"></script>
</body>
</html>
